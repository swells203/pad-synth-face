run:
  name: v21_seta_d3
  output: ./datasets/v21_seta_d3
  seed: 20260522
  deterministic: true

modality: face

bonafide:
  root: ./datasets/_fixtures/digiface
  samples_per_bonafide: 256
  splits:
    train: 0.0
    dev: 0.0
    test: 1.0

attacks:
  print:
    weight: 1.0
    ontology: ./ontology/face/print.yaml
  replay:
    weight: 1.0
    ontology: ./ontology/face/replay.yaml

sensor_preset: mobile-front-2024
