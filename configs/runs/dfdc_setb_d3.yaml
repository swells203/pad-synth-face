run:
  name: dfdc_setb_d3
  output: ./datasets/dfdc_setb_d3
  seed: 20260523
  deterministic: true

modality: face

bonafide:
  root: ./datasets/_real/dfdc_224
  samples_per_bonafide: 256
  identities_file: ./configs/dfdc_identities_setb.txt
  splits:
    train: 0.0
    dev: 0.0
    test: 1.0

attacks:
  print:
    weight: 1.0
    ontology: ./ontology/face/print.yaml
  replay:
    weight: 1.0
    ontology: ./ontology/face/replay.yaml

sensor_preset: webcam-1080p
