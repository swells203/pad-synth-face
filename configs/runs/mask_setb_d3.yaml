run:
  name: mask_setb_d3
  output: ./datasets/mask_setb_d3
  seed: 20260523
  deterministic: true

modality: face

bonafide:
  root: ./datasets/_real/digiface_224
  samples_per_bonafide: 256
  identities_file: ./configs/digiface_identities_setb.txt
  splits:
    train: 0.0
    dev: 0.0
    test: 1.0

attacks:
  mask:
    weight: 1.0
    ontology: ./ontology/face/mask.yaml

sensor_preset: webcam-1080p
